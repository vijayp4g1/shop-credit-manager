</button>

<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-highest">

</div>
<div class="flex items-center gap-2">
<button class="hover:bg-surface-container-high transition-colors active:scale-95 duration-100 p-2 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">search</span>
</button>
<button class="hover:bg-surface-container-high transition-colors active:scale-95 duration-100 p-2 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">more_vert</span>
</button>

</header>

<div class="flex justify-between items-start mb-4">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Ramesh Kumar</h2>
<p class="font-body-md text-text-secondary flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[18px]">call</span>
            +91 98765 43210
          </p>
</div>
<button class="flex items-center gap-1 text-primary hover:bg-surface-container-high px-3 py-1.5 rounded-full transition-all">
<span class="material-symbols-outlined text-[18px]">download</span>
<span class="font-label-lg text-label-lg">Report</span>
</button>
</div>
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col items-center justify-center border border-outline-variant">

<span class="font-label-lg text-label-lg text-udhar-destructive">Due</span>
</div>
</div>
</section>

</div>

</div>

</div>

</div>
</div>
<div class="text-right">
<p class="font-amount-display text-amount-display text-udhar-destructive">₹1,000</p>
<p class="font-label-sm text-label-sm text-udhar-destructive uppercase font-bold">Udhar</p>

<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-secondary-container/10 rounded-full blur-3xl"></div>
