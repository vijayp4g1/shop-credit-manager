<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#6f797c",
                        "inverse-on-surface": "#eff1f2",
                        "surface-dim": "#d8dadc",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#ffdcc0",
                        "primary": "#004655",
                        "secondary-fixed-dim": "#6bd7da",
                        "on-primary-fixed": "#001f27",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#00696c",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface": "#f7fafb",
                        "secondary-container": "#86f0f3",
                        "outline-variant": "#bfc8cc",
                        "surface-bright": "#f7fafb",
                        "surface-container-low": "#f2f4f5",
                        "secondary-fixed": "#89f3f6",
                        "surface-container-highest": "#e0e3e4",
                        "on-secondary-fixed-variant": "#004f51",
                        "surface-tint": "#13677b",
                        "tertiary-container": "#7c4b17",
                        "primary-container": "#005f73",
                        "on-surface": "#191c1d",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#3f484c",
                        "on-tertiary-fixed": "#2d1600",
                        "on-tertiary-container": "#ffbf86",
                        "jama-success": "#2D6A4F",
                        "surface-container-high": "#e6e8ea",
                        "surface-variant": "#e0e3e4",
                        "on-secondary-container": "#006e70",
                        "on-primary-fixed-variant": "#004e5f",
                        "on-primary-container": "#91d7ee",
                        "primary-fixed-dim": "#8bd1e8",
                        "on-background": "#191c1d",
                        "primary-fixed": "#b2ebff",
                        "background": "#f7fafb",
                        "text-primary": "#1E293B",
                        "on-tertiary-fixed-variant": "#693c07",
                        "tertiary-fixed-dim": "#fcb97b",
                        "udhar-destructive": "#C9184A",
                        "error-container": "#ffdad6",
                        "text-secondary": "#64748B",
                        "surface-background": "#F8FAFC",
                        "tertiary": "#603401",
                        "inverse-surface": "#2d3132",
                        "on-secondary-fixed": "#002021",
                        "surface-container": "#eceef0",
                        "inverse-primary": "#8bd1e8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "card-padding": "16px",
                        "touch-target-min": "48px",
                        "gutter": "12px",
                        "margin-mobile": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "amount-display": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "amount-display": ["28px", {"lineHeight": "34px", "fontWeight": "700"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- Top AppBar (Back Action + Title) -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface-dim shadow-sm flex items-center justify-between px-margin-mobile h-touch-target-min w-full">
<div class="flex items-center gap-4">
<button class="h-touch-target-min w-touch-target-min flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">New Entry</h1>
</div>
<button class="h-touch-target-min w-touch-target-min flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface-variant">help</span>
</button>
</header>
<main class="pt-20 px-margin-mobile max-w-lg mx-auto">
<!-- Transaction Type Toggle -->
<div class="flex bg-surface-container-low p-1 rounded-xl mb-6 shadow-inner">
<button class="flex-1 py-3 rounded-lg font-label-lg text-label-lg text-on-surface-variant bg-transparent transition-all">
                You Gave (Udhar)
            </button>
<button class="flex-1 py-3 rounded-lg font-label-lg text-label-lg bg-jama-success text-white shadow-sm transition-all">
                You Got (Jama)
            </button>
</div>
<!-- Customer Selection Card -->
<div class="bg-white border border-outline-variant rounded-xl p-card-padding mb-6 flex items-center justify-between shadow-[0_4px_6px_-1px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden">
<img alt="RK" class="w-full h-full object-cover" data-alt="A professional studio headshot of an Indian middle-aged businessman named Ramesh Kumar, wearing a clean linen shirt. The lighting is soft and professional, set against a blurred shop interior background with warm wood tones. The overall aesthetic is reliable and professional, consistent with a modern retail management application's light mode theme." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkYNLz7XTtb1WBN9cRxTRjAJ1jsxCKgatlbL8YdmmgEIW7Cvd4018zrgcLQnVd-OTCPfRgNe8ghRV1XbYyGirMy53ocZTe7SSI1aYiMcva7yn4MGgYShgfRSiTxl4abuS6Z2QduOTcwFNt5Z5_JiSjNSHz6sc-MZn3XC3-R7qe-1A3DVc0r9pb3kLOoTatsQ5zbso8v6GBl5GoQJhy89DY0cE35ol_afiydcYPXrZ8IsNhCB1j0zCqL8b7Yp1nFpsXV0t8XgAWkvg"/>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant">Selected Customer</p>
<p class="font-headline-sm text-headline-sm text-on-surface">Ramesh Kumar</p>
</div>
</div>
<button class="text-primary font-label-lg text-label-lg flex items-center gap-1 active:scale-95 duration-100">
                Change
                <span class="material-symbols-outlined text-[20px]">swap_horiz</span>
</button>
</div>
<!-- Amount Entry Section -->
<div class="bg-white border border-outline-variant rounded-xl p-card-padding mb-6 shadow-[0_4px_6px_-1px_rgba(0,0,0,0.04)]">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2">Transaction Amount</label>
<div class="flex items-center border-b-2 border-jama-success py-2 mb-4">
<span class="font-display-lg text-display-lg text-jama-success mr-2">₹</span>
<input autofocus="" class="w-full font-display-lg text-display-lg bg-transparent border-none focus:ring-0 p-0 text-on-surface appearance-none" placeholder="0" type="number"/>
</div>
<!-- Quick Amount Chips -->
<div class="grid grid-cols-4 gap-2">
<button class="h-touch-target-min flex items-center justify-center border border-outline-variant rounded-lg font-label-lg text-label-lg hover:bg-surface-container-high active:scale-95 transition-all text-on-surface-variant">+100</button>
<button class="h-touch-target-min flex items-center justify-center border border-outline-variant rounded-lg font-label-lg text-label-lg hover:bg-surface-container-high active:scale-95 transition-all text-on-surface-variant">+500</button>
<button class="h-touch-target-min flex items-center justify-center border border-outline-variant rounded-lg font-label-lg text-label-lg hover:bg-surface-container-high active:scale-95 transition-all text-on-surface-variant">+1000</button>
<button class="h-touch-target-min flex items-center justify-center border border-outline-variant rounded-lg font-label-lg text-label-lg hover:bg-surface-container-high active:scale-95 transition-all text-on-surface-variant">+2000</button>
</div>
</div>
<!-- Details Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
<!-- Date Picker -->
<div class="bg-white border border-outline-variant rounded-xl p-card-padding flex items-center justify-between shadow-[0_4px_6px_-1px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant">Date</p>
<p class="font-body-md text-body-md text-on-surface">Today, 24 Oct</p>
</div>
</div>
<button class="material-symbols-outlined text-primary">edit</button>
</div>
<!-- Optional Note -->
<div class="bg-white border border-outline-variant rounded-xl p-card-padding flex items-center gap-3 shadow-[0_4px_6px_-1px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-on-surface-variant">notes</span>
<div class="flex-1">
<input class="w-full bg-transparent border-none focus:ring-0 p-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" placeholder="Add description (Optional)" type="text"/>
</div>
</div>
</div>
<!-- Attachment/Camera Quick Action -->
<div class="flex justify-center mb-10">
<button class="flex items-center gap-2 px-6 py-2 rounded-full border border-dashed border-outline text-outline font-label-lg text-label-lg hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">photo_camera</span>
                Attach Bill / Receipt
            </button>
</div>
</main>
<!-- Sticky Bottom Action -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-surface shadow-[0_-4px_12px_rgba(0,0,0,0.08)] z-50">
<div class="max-w-lg mx-auto flex gap-3">
<button class="flex-1 h-touch-target-min bg-jama-success text-white rounded-xl font-headline-sm text-headline-sm flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Save Transaction
            </button>
</div>
</div>
</body></html>
